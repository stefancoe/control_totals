#----------------------------
# General settings
#----------------------------
data_dir: data
output_dir: output

base_year: 2020 
end_year: 2050 # final year for control totals output

targets_end_year: 2044 # year for which growth targets are set


#----------------------------
# Hard coded King County gq, hhsz and vacancy rates by rgid
# need to add these as calculations in the future once I find the source
#----------------------------
king_gq: # first column is rgid, second is gq percentage
  1: 3.4
  2: 1.2
  3: 1.6
  4: .3
  5: .3
  6: .4

king_hhsz: # first column is rgid, second is average household size
  1: 2.12
  2: 2.52
  3: 2.51
  4: 2.75
  5: 2.65
  6: 2.62

king_metro_adj_hhsz: 2.00 # adjusted hhsz used for king county metro rgid areas when calclulating hhpop
                          # for the targets, the rgid totals still use the king_hhsz value above

king_vac: # first column is rgid, second is vacancy rate percentage
  1: 4.7
  2: 4.4
  3: 3.6
  4: 3.0
  5: 3.0
  6: 5.0

king_hhpop_2044: 2828620 # target household population for king county in 2044
                         # not sure where this number comes from, will need to
                         # replace with calculated value in the future

#----------------------------
# Employment settings
#----------------------------
emp_target_types:
  includes res con: [53035, 53053] # Kitsap and Pierce targets include resource and construction employment
  excludes res con: [53033, 53061] # King, Snohomish targets do not include resource and construction employment

res_con_emp_growth_pct: 0.028 # percentage of employment growth from resource and construction
                              # ussed to adjust King and Snohomish employment growth targets since they 
                              # exclude resource and construction employment. Originally based on REF
                              # projections, will need to be updated, possibly with REMI

#----------------------------
# Census settings
#----------------------------
CensusKey: CENSUS_KEY # Environment variable name for Census API key

census_year: 2020
county_ids: [53033,53035,53053,53061]
state_id: 53

census_variables:
  dec_total_pop: # name variable will be changed to
    - P1_001N # variable code from census api
  dec_units:
    - H1_001N
  dec_hh:
    - H1_002N
  dec_gq:
    - P5_001N


