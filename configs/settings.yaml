#----------------------------
# Pypyr steps
#----------------------------
steps:
 - steps.get_elmer_data # pulls data from elmer database and saves to hdf5
 - steps.create_control_area_geography # creates control area geography by unioning and dissolving regional geographies, military bases, tribal areas, and natural resource areas together
#  - steps.get_census_data # pulls decennial census data from api and saves to hdf5
#  - steps.load_shapefiles # loads shapefiles in data/shapefiles into hdf5
#  - steps.load_data # loads data from csv files into hdf5
#  - steps.block_regional_geography_xwalk # creates block to regional geography crosswalk
#  - steps.parcel_control_area_xwalk # creates parcel to control area crosswalk
#  - steps.prepare_block_data # aggregates block data (ofm and decennial) to regional geography level
#  - steps.adjust_targets_to_base_year # adjusts targets to base year using ofm and employment data
#  - steps.units_chg_targets # calculates targets that use housing unit change (only king county for now)
#  - steps.total_pop_chg_targets # calculates targets that use total population change
#  - steps.emp_chg_targets_res_con # calculates targets for counties that include resource and construction employment
#  - steps.emp_chg_targets_no_res_con # calculates targets for counties that exclude resource and construction employment
#  - steps.emp_chg_targets_no_res_con # calculates targets for counties that exclude resource and construction employment
#  - steps.extrapolate_to_controls_year # extrapolates out to the control totals end year from the targets end year
